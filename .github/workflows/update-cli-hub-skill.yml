name: Update CLI-Hub Skill

on:
  push:
    branches:
      - main
    paths:
      - 'registry.json'
      - '.github/scripts/generate_meta_skill.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-skill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Generate meta-skill
        run: python3 .github/scripts/generate_meta_skill.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cli-hub-skill/SKILL.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-update cli-hub-skill/SKILL.md from registry.json"
            git push
          fi
